  /api/fulfillment/v1/baremetal_instance_catalog_items/{object.id}:
    patch:
      operationId: BareMetalInstanceCatalogItems_Update
      parameters:
      - description: Unique identifier of the catalog item.
        explode: false
        in: path
        name: object.id
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          Lock enables optimistic locking. When set to true, the server verifies that the current version of the object
          matches the value of the metadata.version field of the submitted object. If they differ the update will be
