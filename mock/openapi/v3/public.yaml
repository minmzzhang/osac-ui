          type: array
        size:
          description: |-
            Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
            of the request if there are not enough items, or if the system decides that returning that number of items isn't
            feasible or convenient for performance reasons.
          format: int32
          type: integer
        total:
          description: |-
            Total number of items of the collection that match the search criteria, regardless of the number of results
            requested with the `limit` parameter.
          format: int32
          type: integer
      type: object
    v1ExternalIPsUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIP'
      type: object
    v1FieldDefinition:
      description: Defines a single field on the resource spec that a catalog item
        controls.
      properties:
        default:
          description: Default value for this field.
          type: object
        display_name:
          description: Human friendly label for this field, suitable for displaying
            in a UI.
          type: string
        editable:
          description: Whether the user is allowed to set this field.
          type: boolean
        path:
          description: Dot-notation path referencing a field in the resource spec.
          type: string
        validation_schema:
          description: Optional JSON Schema (draft 2020-12) for validating user-provided
            values of editable fields.
          type: string
      type: object
    v1HostType:
      description: |-
        Describes a set of hosts that share characteristics.

        For example there could be a host type `acme_1tb` to describe the set of hosts manifactured by ACME and with 1 TiB
        of RAM, and another `ibm_mi300x` to describe the set of hosts manufactured IBM and with a MI300X GPU.

        This is similar to the _instance type_ concept used by many cloud providers.

        The detailed chracteristics of the host (CPU, memory, GPU, etc) will be in the `description` field.
      properties:
        description:
          description: Human friendly long description of the host type, using Markdown
            format.
          type: string
        id:
          description: Unique identifier of the type.
          type: string
        interfaces:
          description: |-
            Physical network interfaces available on hosts of this type.

            This is only meaningful for bare metal host types. Virtual machine host types have an empty list because VMs
            receive virtual NICs from the overlay network, not physical interfaces. This also serves as the bare metal vs
            virtual machine discriminator: if a host type has interfaces it is bare metal, if empty it is virtual.

            Interfaces are ordered. When multiple interfaces share the same role, the first one in the list is the default
            for that role.
          items:
            $ref: '#/components/schemas/v1NetworkInterface'
          type: array
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        title:
          description: |-
            Human friendly short description of the host type, only a few words, suitable for displaying in one single
            line on a UI or CLI.
          type: string
      type: object
    v1HostTypesCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1HostType'
      type: object
    v1HostTypesDeleteResponse:
      type: object
    v1HostTypesGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1HostType'
      type: object
    v1HostTypesListResponse:
      properties:
