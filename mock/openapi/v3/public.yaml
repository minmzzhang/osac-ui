    apiHttpBody:
      description: |-
        Message that represents an arbitrary HTTP body. It should only be used for
        payload formats that can't be represented as JSON, such as raw binary or
        an HTML page.


        This message can be used both in streaming and non-streaming API methods in
        the request as well as the response.

        It can be used as a top-level request field, which is convenient if one
        wants to extract parameters from either the URL or HTTP template into the
        request fields and also want access to the raw HTTP body.

        Example:

            message GetResourceRequest {
              // A unique request id.
              string request_id = 1;

              // The raw HTTP body is bound to this field.
              google.api.HttpBody http_body = 2;

            }

            service ResourceService {
              rpc GetResource(GetResourceRequest)
                returns (google.api.HttpBody);
              rpc UpdateResource(google.api.HttpBody)
                returns (google.protobuf.Empty);

            }

        Example with streaming methods:

            service CaldavService {
              rpc GetCalendar(stream google.api.HttpBody)
                returns (stream google.api.HttpBody);
              rpc UpdateCalendar(stream google.api.HttpBody)
                returns (stream google.api.HttpBody);

            }

        Use of this type only changes how the request and response bodies are
        handled, all other features will continue to work unchanged.
      properties:
        content_type:
          description: The HTTP Content-Type header value specifying the content type
            of the body.
          type: string
        data:
          description: The HTTP request/response body as raw binary.
          format: byte
          pattern: ^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$
          type: string
        extensions:
          description: |-
            Application specific response metadata. Must be set in the first response
            for streaming APIs.
          items:
            $ref: '#/components/schemas/protobufAny'
          type: array
      type: object
    baremetal_instance_catalog_items_object_id_body:
      description: |-
        A bare metal instance catalog item defines a curated hardware offering that references an underlying bare metal
        instance template.
      properties:
        description:
          description: Human friendly long description of the catalog item, using
            Markdown format.
          type: string
        field_definitions:
          description: Definitions of the fields that users can or cannot set when
            creating a resource from this catalog item.
          items:
            $ref: '#/components/schemas/v1FieldDefinition'
          type: array
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        published:
          description: Whether this catalog item is published.
          type: boolean
        template:
          description: Identifier of the underlying bare metal instance template that
            this catalog item references.
          type: string
        title:
          description: Human friendly short description of the catalog item, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    baremetal_instance_templates_object_id_body:
      description: |-
        A bare metal instance template defines a hardware profile (host type, OS image, network configuration)
        that can be used to create bare metal instances via a catalog item.
      properties:
        description:
          description: Human friendly long description of the template, using Markdown
            format.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        parameters:
          description: |-
            Definitions of the parameters that can be used to customize the template.

            Note that these are only the *definitions* of the parameters, not the actual values. The actual values are in the
            `spec.template_parameters` field of the bare metal instance.
          items:
            $ref: '#/components/schemas/v1BareMetalInstanceTemplateParameterDefinition'
          type: array
        spec_defaults:
          $ref: '#/components/schemas/v1BareMetalInstanceTemplateSpecDefaults'
        title:
          description: Human friendly short description of the template, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    baremetal_instances_object_id_body:
      description: |-
        Contains the details of a bare metal instance.

        The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status
        of the bare metal instance, is provided by the system and can't be modified by the user.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1BareMetalInstanceSpec'
        status:
          $ref: '#/components/schemas/v1BareMetalInstanceStatus'
      type: object
    cluster_catalog_items_object_id_body:
      description: |-
        A cluster catalog item defines a curated infrastructure offering that references an underlying cluster template.
        Admins control which fields users can set, enforce defaults, and validate input via JSON Schema.
      properties:
        description:
          description: Human friendly long description of the catalog item, using
            Markdown format.
          type: string
        field_definitions:
          description: Definitions of the fields that users can or cannot set when
            creating a resource from this catalog item.
          items:
            $ref: '#/components/schemas/v1FieldDefinition'
          type: array
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        published:
          description: Whether this catalog item is published.
          type: boolean
        template:
          description: Identifier of the underlying cluster template that this catalog
            item references.
          type: string
        title:
          description: Human friendly short description of the catalog item, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    cluster_templates_object_id_body:
      description: |-
        A cluster template defines a type of cluster that can be created by the user. Note that the user doesn't create these
        templates: the system provides a collection of them, and the user chooses one.
      properties:
        description:
          description: Human friendly long description of the template, using Markdown
            format.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        node_sets:
          additionalProperties:
            $ref: '#/components/schemas/v1ClusterTemplateNodeSet'
          description: Initial node sets of the cluster.
          type: object
        parameters:
          description: |-
            Definitions of the parameters that can be used to customize the template.

            Note that these are only the *definitions* of the parameters, not the actual values. The actual values are in the
            `spec.template_parameters` field of the cluster.
          items:
            $ref: '#/components/schemas/v1ClusterTemplateParameterDefinition'
          type: array
        spec_defaults:
          $ref: '#/components/schemas/v1ClusterTemplateSpecDefaults'
        title:
          description: |-
            Human friendly short description of the template, only a few words, suitable for displaying in one single line on a
            UI or CLI.
          type: string
      type: object
    cluster_versions_object_id_body:
      description: |-
        Describes an OpenShift release version available for cluster provisioning.

        Cluster versions are admin-managed catalog entries that define which OpenShift versions are available. Users
        select a cluster version by name when creating clusters, either directly via Cluster `spec.version_name` or
        through a ClusterTemplate `spec_defaults.version_name`. Cloud Provider Admins control the version catalog
        through lifecycle-managed cluster versions.

        If `metadata.name` is omitted on creation, it is auto-generated from `spec.version` by lowercasing and
        replacing non-alphanumeric characters with dashes (e.g., "4.17.0" becomes "4-17-0").

        Lifecycle follows: ACTIVE -> DEPRECATED -> OBSOLETE. All transitions between states are allowed.
        Deletion is rejected if the version is referenced by active clusters, templates, or catalog items.

        The `spec` contains the desired configuration, and may be modified by the admin. The `status` contains the
        current state of the cluster version, is provided by the system and can't be modified by the user.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ClusterVersionSpec'
        status:
          $ref: '#/components/schemas/v1ClusterVersionStatus'
      type: object
    clusters_object_id_body:
      description: |-
        Contains the details of the cluster.

        The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status of
        the cluster, is provided by the system and can't be modified by the user.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ClusterSpec'
        status:
          $ref: '#/components/schemas/v1ClusterStatus'
      type: object
    compute_instance_catalog_items_object_id_body:
      description: |-
        A compute instance catalog item defines a curated infrastructure offering that references an underlying compute
        instance template.
      properties:
        description:
          description: Human friendly long description of the catalog item, using
            Markdown format.
          type: string
        field_definitions:
          description: Definitions of the fields that users can or cannot set when
            creating a resource from this catalog item.
          items:
            $ref: '#/components/schemas/v1FieldDefinition'
          type: array
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        published:
          description: Whether this catalog item is published.
          type: boolean
        template:
          description: Identifier of the underlying compute instance template that
            this catalog item references.
          type: string
        title:
          description: Human friendly short description of the catalog item, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    compute_instance_templates_object_id_body:
      description: |-
        A compute instance template defines a type of compute instance that can be created by the user. Note that the user doesn't create these
        templates: the system provides a collection of them, and the user chooses one.
      properties:
        description:
          description: Human friendly long description of the template, using Markdown
            format.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        parameters:
          description: |-
            Definitions of the parameters that can be used to customize the template.

            Note that these are only the *definitions* of the parameters, not the actual values. The actual values are in the
            `spec.template_parameters` field of the compute instance.
          items:
            $ref: '#/components/schemas/v1ComputeInstanceTemplateParameterDefinition'
          type: array
        spec_defaults:
          $ref: '#/components/schemas/v1ComputeInstanceTemplateSpecDefaults'
        title:
          description: |-
            Human friendly short description of the template, only a few words, suitable for displaying in one single line on a
            UI or CLI.
          type: string
      type: object
    compute_instances_object_id_body:
      description: |-
        Contains the details of the compute instance.

        The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status of
        the compute instance, is provided by the system and can't be modified by the user.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ComputeInstanceSpec'
        status:
          $ref: '#/components/schemas/v1ComputeInstanceStatus'
      type: object
    external_ip_attachments_object_id_body:
      description: |-
        Represents a binding between an ExternalIP and a target resource.

        An ExternalIPAttachment is a first-class resource that manages the attach/detach lifecycle
        independently from the ExternalIP allocation lifecycle. Creating an ExternalIPAttachment triggers
        the attach workflow; deleting it triggers the detach workflow.

        The binding is immutable: to change the target, delete the attachment and create a new one.
        The oneof target field supports ComputeInstance, Cluster, and BareMetalInstance targets.

        For cluster targets, the target_endpoint field specifies which cluster endpoint receives the
        external IP (API server or ingress). An ExternalIPAttachment can be created before the cluster
        is ready and will activate automatically once the cluster's VIP is available.

        Lifecycle: PENDING (attach in progress) -> READY (attached and routing traffic).
        FAILED is a terminal error state that retries via the standard provisioning lifecycle
        with exponential backoff.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ExternalIPAttachmentSpec'
        status:
          $ref: '#/components/schemas/v1ExternalIPAttachmentStatus'
      type: object
    external_ips_object_id_body:
      description: |-
        Represents an external IP address allocated from an ExternalIPPool.

        An ExternalIP is a floating IP address allocated from a parent ExternalIPPool's CIDR ranges.
        "External" means external to the VirtualNetwork — the address may be internet-routable or
        data-center-routable depending on the deployment topology. The pool assignment is immutable
        after creation.

        Attachment to a target resource (e.g., ComputeInstance, Cluster, BareMetalInstance) is managed
        by a separate ExternalIPAttachment resource. The status.attached boolean indicates whether an
        ExternalIPAttachment currently exists for this ExternalIP.

        The lifecycle follows: PENDING (awaiting allocation) -> ALLOCATED (IP assigned).
        FAILED is a terminal error state for provisioning failures.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ExternalIPSpec'
        status:
          $ref: '#/components/schemas/v1ExternalIPStatus'
      type: object
    host_types_object_id_body:
      description: |-
        Describes a set of hosts that share characteristics.

        For example there could be a host type `acme_1tb` to describe the set of hosts manifactured by ACME and with 1 TiB
        of RAM, and another `ibm_mi300x` to describe the set of hosts manufactured IBM and with a MI300X GPU.

        This is similar to the _instance type_ concept used by many cloud providers.

        The detailed chracteristics of the host (CPU, memory, GPU, etc) will be in the `description` field.
      properties:
        description:
          description: Human friendly long description of the host type, using Markdown
            format.
          type: string
        interfaces:
          description: |-
            Physical network interfaces available on hosts of this type.

            This is only meaningful for bare metal host types. Virtual machine host types have an empty list because VMs
            receive virtual NICs from the overlay network, not physical interfaces. This also serves as the bare metal vs
            virtual machine discriminator: if a host type has interfaces it is bare metal, if empty it is virtual.

            Interfaces are ordered. When multiple interfaces share the same role, the first one in the list is the default
            for that role.
          items:
            $ref: '#/components/schemas/v1NetworkInterface'
          type: array
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        title:
          description: |-
            Human friendly short description of the host type, only a few words, suitable for displaying in one single
            line on a UI or CLI.
          type: string
      type: object
    instance_types_object_id_body:
      description: |-
        Describes a pre-configured compute bundle (cores, memory) that can be referenced by name when creating VMs.

        Instance types are admin-managed catalog resources. Tenant users select an instance type by name instead
        of specifying raw compute resources. Cloud Provider Admins control the available configurations through
        lifecycle-managed instance types.

        This is similar to the instance type concepts used by cloud providers (AWS EC2 instance types, Azure VM sizes,
        GCP machine types).

        The `spec` contains the desired configuration, and may be modified by the admin. The `status` contains the
        current state of the instance type, is provided by the system and can't be modified by the user.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1InstanceTypeSpec'
        status:
          $ref: '#/components/schemas/v1InstanceTypeStatus'
      type: object
    nat_gateways_object_id_body:
      description: |-
        Represents a NAT gateway for outbound traffic (SNAT) from a VirtualNetwork.

        A NATGateway provides a dedicated egress identity for all resources within a VirtualNetwork.
        All outbound traffic from the VirtualNetwork's CIDR is source-NATted to the associated
        ExternalIP address. This gives tenants a known, stable source IP for egress traffic —
        useful for allowlisting, auditing, and compliance.

        NATGateway handles outbound traffic only (SNAT). Inbound traffic (DNAT) is handled by
        ExternalIPAttachment. An ExternalIP can only be used by one consumer — either a NATGateway
        or an ExternalIPAttachment, not both.

        One NATGateway is allowed per VirtualNetwork. Creating a second NATGateway for the same
        VirtualNetwork is rejected. All spec fields are immutable after creation.

        The lifecycle follows: PENDING (SNAT rule being configured) -> READY (egress active).
        FAILED is a terminal error state for provisioning failures.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1NATGatewaySpec'
        status:
          $ref: '#/components/schemas/v1NATGatewayStatus'
      type: object
    network_classes_object_id_body:
      description: |-
        Describes a network implementation strategy available for creating virtual networks.

        NetworkClass represents a specific network backend implementation that VirtualNetworks can use. For example,
        there could be a network class `udn-net` to describe networks implemented using User-Defined Networks in
        Kubernetes, and another `phys-net` for networks backed by physical network infrastructure.

        This is similar to the _storage class_ concept used by Kubernetes for persistent volumes, or the _instance type_
        concept used by cloud providers for compute resources.

        Users query available NetworkClasses to discover which network types they can choose when
        creating VirtualNetworks.
      properties:
        capabilities:
          $ref: '#/components/schemas/v1NetworkClassCapabilities'
        description:
          description: |-
            Human friendly long description of the network class, using Markdown format. This should explain the
            characteristics of networks created using this class, including performance characteristics, isolation
            guarantees, and any limitations or requirements.
          type: string
        is_default:
          description: |-
            Whether this NetworkClass is the default. Only one NetworkClass can be the default at a time.
            When a VirtualNetwork is created without specifying network_class, the default NetworkClass is used.
          readOnly: true
          type: boolean
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        status:
          $ref: '#/components/schemas/v1NetworkClassStatus'
        title:
          description: |-
            Human friendly short description of the network class, only a few words, suitable for displaying in one single
            line on a UI or CLI. For example: "UDN Network" or "Physical Network".
          type: string
      type: object
    projects_object_id_body:
      description: |-
        A project is a logical grouping of resources.

        Projects provide a way to organize and isolate resources, manage access controls, and track resource usage. Projects
        can be nested to create hierarchical resource organization, allowing for flexible multi-level resource grouping.

        For nested projects, the parent is identified by the `metadata.project` field, which contains the full name of the
        parent project. Tenant isolation is enforced via the standard `metadata.tenant` field.

        Projects support the following use cases:
        - Organizing resources by team, department, or application
        - Hierarchical resource isolation (e.g., prod/staging/dev as nested projects)
        - Quota and resource allocation boundaries
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ProjectSpec'
        status:
          $ref: '#/components/schemas/v1ProjectStatus'
      type: object
    protobufAny:
      additionalProperties:
        type: object
      description: |-
        `Any` contains an arbitrary serialized protocol buffer message along with a
        URL that describes the type of the serialized message.

        Protobuf library provides support to pack/unpack Any values in the form
        of utility functions or additional generated methods of the Any type.

        Example 1: Pack and unpack a message in C++.

            Foo foo = ...;
            Any any;
            any.PackFrom(foo);
            ...
            if (any.UnpackTo(&foo)) {
              ...
            }

        Example 2: Pack and unpack a message in Java.

            Foo foo = ...;
            Any any = Any.pack(foo);
            ...
            if (any.is(Foo.class)) {
              foo = any.unpack(Foo.class);
            }
            // or ...
            if (any.isSameTypeAs(Foo.getDefaultInstance())) {
              foo = any.unpack(Foo.getDefaultInstance());
            }

         Example 3: Pack and unpack a message in Python.

            foo = Foo(...)
            any = Any()
            any.Pack(foo)
            ...
            if any.Is(Foo.DESCRIPTOR):
              any.Unpack(foo)
              ...

         Example 4: Pack and unpack a message in Go

             foo := &pb.Foo{...}
             any, err := anypb.New(foo)
             if err != nil {
               ...
             }
             ...
             foo := &pb.Foo{}
             if err := any.UnmarshalTo(foo); err != nil {
               ...
             }

        The pack methods provided by protobuf library will by default use
        'type.googleapis.com/full.type.name' as the type URL and the unpack
        methods only use the fully qualified type name after the last '/'
        in the type URL, for example "foo.bar.com/x/y.z" will yield type
        name "y.z".

        JSON
        ====
        The JSON representation of an `Any` value uses the regular
        representation of the deserialized, embedded message, with an
        additional field `@type` which contains the type URL. Example:

            package google.profile;
            message Person {
              string first_name = 1;
              string last_name = 2;
            }

            {
              "@type": "type.googleapis.com/google.profile.Person",
              "firstName": <string>,
              "lastName": <string>
            }

        If the embedded message type is well-known and has a custom JSON
        representation, that representation will be embedded adding a field
        `value` which holds the custom JSON in addition to the `@type`
        field. Example (for message [google.protobuf.Duration][]):

            {
              "@type": "type.googleapis.com/google.protobuf.Duration",
              "value": "1.212s"
            }
      properties:
        '@type':
          description: |-
            A URL/resource name that uniquely identifies the type of the serialized
            protocol buffer message. This string must contain at least
            one "/" character. The last segment of the URL's path must represent
            the fully qualified name of the type (as in
            `path/google.protobuf.Duration`). The name should be in a canonical form
            (e.g., leading "." is not accepted).

            In practice, teams usually precompile into the binary all types that they
            expect it to use in the context of Any. However, for URLs which use the
            scheme `http`, `https`, or no scheme, one can optionally set up a type
            server that maps type URLs to message definitions as follows:

            * If no scheme is provided, `https` is assumed.
            * An HTTP GET on the URL must yield a [google.protobuf.Type][]
              value in binary format, or produce an error.
            * Applications are allowed to cache lookup results based on the
              URL, or have them precompiled into a binary to avoid any
              lookup. Therefore, binary compatibility needs to be preserved
              on changes to types. (Use versioned type names to manage
              breaking changes.)

            Note: this functionality is not currently available in the official
            protobuf release, and it is not used for type URLs beginning with
            type.googleapis.com. As of May 2023, there are no widely used type server
            implementations and no plans to implement one.

            Schemes other than `http`, `https` (or the empty scheme) might be
            used with implementation specific semantics.
          type: string
      type: object
    protobufNullValue:
      default: NULL_VALUE
      description: |-
        `NullValue` is a singleton enumeration to represent the null value for the
        `Value` type union.

        The JSON representation for `NullValue` is JSON `null`.

         - NULL_VALUE: Null value.
      enum:
      - NULL_VALUE
      type: string
    public_ip_attachments_object_id_body:
      description: |-
        Represents a binding between a PublicIP and a target resource (e.g., a ComputeInstance).

        A PublicIPAttachment is a first-class resource that manages the attach/detach lifecycle
        independently from the PublicIP allocation lifecycle. Creating a PublicIPAttachment triggers
        the attach workflow; deleting it triggers the detach workflow.

        The binding is immutable: to change the target, delete the attachment and create a new one.
        The oneof target field supports future target types (Cluster, BareMetalServer) without
        breaking changes.

        Lifecycle: PENDING (attach in progress) -> READY (attached and routing traffic).
        FAILED is a terminal error state that retries via the standard provisioning lifecycle
        with exponential backoff.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1PublicIPAttachmentSpec'
        status:
          $ref: '#/components/schemas/v1PublicIPAttachmentStatus'
      type: object
    public_ips_object_id_body:
      description: |-
        Represents a public IP address allocated from a PublicIPPool.

        A PublicIP is a floating public IP address allocated from a parent PublicIPPool's CIDR ranges.
        The pool can be specified directly or auto-selected based on IP family preference.
        The pool assignment is immutable after creation.

        Attachment to a target resource (e.g., ComputeInstance) is managed by a separate
        PublicIPAttachment resource. The status.attached boolean indicates whether a
        PublicIPAttachment currently exists for this PublicIP.

        The lifecycle follows: PENDING (awaiting allocation) -> ALLOCATED (IP assigned).
        FAILED is a terminal error state for provisioning failures.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1PublicIPSpec'
        status:
          $ref: '#/components/schemas/v1PublicIPStatus'
      type: object
    rpcStatus:
      properties:
        code:
          format: int32
          type: integer
        details:
          items:
            $ref: '#/components/schemas/protobufAny'
          type: array
        message:
          type: string
      type: object
    security_groups_object_id_body:
      description: |-
        Represents a virtual firewall controlling network traffic for compute instances.

        SecurityGroup acts as a stateful firewall that controls inbound (ingress) and outbound (egress) traffic for
        compute instances within a VirtualNetwork. Rules are stateful, meaning return traffic is automatically allowed
        for established connections.

        SecurityGroups follow a default-deny policy: if no rules match, traffic is blocked. This ensures secure-by-default
        behavior where only explicitly allowed traffic can pass through.

        SecurityGroups are scoped to a VirtualNetwork and can be attached to multiple compute instances within that
        network. They cannot be used across different VirtualNetworks.

        The parent VirtualNetwork relationship is established via metadata.annotations using the 'osac.openshift.io/owner-reference'
        key with the VirtualNetwork ID as the value. This enables proper resource hierarchy for garbage collection - when
        a VirtualNetwork is deleted, all associated SecurityGroups are automatically cleaned up.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1SecurityGroupSpec'
        status:
          $ref: '#/components/schemas/v1SecurityGroupStatus'
      type: object
    subnets_object_id_body:
      description: |-
        Represents a subdivision of a VirtualNetwork for organizing compute instances.

        Subnets subdivide VirtualNetwork IP address space into smaller, manageable segments. Each Subnet belongs to exactly
        one parent VirtualNetwork and must be in the same region. Initially, the system supports a 1:1 mapping between
        VirtualNetwork and Subnet (one subnet per network), but the schema is designed to support multiple subnets per
        VirtualNetwork in the future.

        Subnets support flexible IP addressing to match the parent VirtualNetwork's capabilities:
        - IPv4-only: Set ipv4_cidr, leave ipv6_cidr empty
        - IPv6-only: Set ipv6_cidr, leave ipv4_cidr empty
        - Dual-stack: Set both ipv4_cidr and ipv6_cidr

        The parent VirtualNetwork relationship should be specified via metadata.annotations using the 'osac.openshift.io/owner-reference'
        key with the VirtualNetwork ID as the value. This establishes resource hierarchy for garbage collection, ensuring
        that Subnets are automatically cleaned up when their parent VirtualNetwork is deleted.

        CIDR blocks must be non-overlapping within the same VirtualNetwork. Each Subnet's CIDR must be a subset of the
        parent VirtualNetwork's CIDR. Validation is enforced at the service layer.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1SubnetSpec'
        status:
          $ref: '#/components/schemas/v1SubnetStatus'
      type: object
    tenants_object_id_body:
      description: A tenant groups resources and users for a customer or business
        unit.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1TenantSpec'
      type: object
    users_object_id_body:
      description: A user in a tenant's identity provider.
      properties:
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1UserSpec'
        status:
          $ref: '#/components/schemas/v1UserStatus'
      type: object
    v1AuthnCapabilities:
      description: Contains the information that helps client know how authentication
        is managed by the server.
      properties:
        trusted_token_issuers:
          description: |-
            A list of the OAuth issuers whose access tokens are accepted by the server.

            This means that the client can select one of this and then use the OAuth discovery endpoint to find the details of
            the OAuth server. For example if the value is `https://my.oauth.com` then the client can obtain the details of the
            authorizatoin server going to the following URL:

              https://my.oauth.com/.well-known/oauth-authorization-server

            The discovery process is defined in [RFC 8414](https://datatracker.ietf.org/doc/html/rfc8414).

            Note that having an access token issued by one of this servers doesn't guarantee that the requests from the user
            will be accepted: it will still be subject to authorization checks that may grant or deny access.
          items:
            type: string
          type: array
      type: object
    v1BareMetalInstance:
      description: |-
        Contains the details of a bare metal instance.

        The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status
        of the bare metal instance, is provided by the system and can't be modified by the user.
      properties:
        id:
          description: Unique identifier of the bare metal instance.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1BareMetalInstanceSpec'
        status:
          $ref: '#/components/schemas/v1BareMetalInstanceStatus'
      type: object
    v1BareMetalInstanceCatalogItem:
      description: |-
        A bare metal instance catalog item defines a curated hardware offering that references an underlying bare metal
        instance template.
      properties:
        description:
          description: Human friendly long description of the catalog item, using
            Markdown format.
          type: string
        field_definitions:
          description: Definitions of the fields that users can or cannot set when
            creating a resource from this catalog item.
          items:
            $ref: '#/components/schemas/v1FieldDefinition'
          type: array
        id:
          description: Unique identifier of the catalog item.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        published:
          description: Whether this catalog item is published.
          type: boolean
        template:
          description: Identifier of the underlying bare metal instance template that
            this catalog item references.
          type: string
        title:
          description: Human friendly short description of the catalog item, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    v1BareMetalInstanceCatalogItemsCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstanceCatalogItem'
      type: object
    v1BareMetalInstanceCatalogItemsDeleteResponse:
      type: object
    v1BareMetalInstanceCatalogItemsGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstanceCatalogItem'
      type: object
    v1BareMetalInstanceCatalogItemsListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/v1BareMetalInstanceCatalogItem'
          type: array
        size:
          format: int32
          type: integer
        total:
          format: int32
          type: integer
      type: object
    v1BareMetalInstanceCatalogItemsUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstanceCatalogItem'
      type: object
    v1BareMetalInstanceCondition:
      description: Contains the details of a condition that describes the status of
        a bare metal instance.
      properties:
        last_transition_time:
          format: date-time
          type: string
        message:
          type: string
        reason:
          type: string
        status:
          $ref: '#/components/schemas/v1ConditionStatus'
        type:
          $ref: '#/components/schemas/v1BareMetalInstanceConditionType'
      type: object
    v1BareMetalInstanceConditionType:
      default: BARE_METAL_INSTANCE_CONDITION_TYPE_UNSPECIFIED
      description: |-
        Types of conditions used to describe the status of a bare metal instance.

         - BARE_METAL_INSTANCE_CONDITION_TYPE_PROVISIONED: Infrastructure has been allocated to this instance by the baremetal fulfillment component.
         - BARE_METAL_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED: OS image and user configuration have been applied by the provisioning provider.
         - BARE_METAL_INSTANCE_CONDITION_TYPE_READY: The machine is available and assigned to the tenant.
        Does not indicate OS readiness — the tenant is responsible for OS-level checks.
         - BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS: A power cycle (restart) is currently in progress.
         - BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_FAILED: A restart request has failed.
         - BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED: Configuration changes require a restart to take effect.
      enum:
      - BARE_METAL_INSTANCE_CONDITION_TYPE_UNSPECIFIED
      - BARE_METAL_INSTANCE_CONDITION_TYPE_PROVISIONED
      - BARE_METAL_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED
      - BARE_METAL_INSTANCE_CONDITION_TYPE_READY
      - BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS
      - BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_FAILED
      - BARE_METAL_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED
      type: string
    v1BareMetalInstanceImage:
      description: Contains the image configuration for a bare metal instance.
      properties:
        source_ref:
          description: Image reference (e.g. OCI image URL).
          type: string
        source_type:
          description: Image source type (e.g. "registry").
          type: string
      type: object
    v1BareMetalInstanceRunStrategy:
      default: BARE_METAL_INSTANCE_RUN_STRATEGY_UNSPECIFIED
      description: |-
        Run strategy for the bare metal instance.

         - BARE_METAL_INSTANCE_RUN_STRATEGY_ALWAYS: The instance is kept powered on.
         - BARE_METAL_INSTANCE_RUN_STRATEGY_HALTED: The instance is powered off.
      enum:
      - BARE_METAL_INSTANCE_RUN_STRATEGY_UNSPECIFIED
      - BARE_METAL_INSTANCE_RUN_STRATEGY_ALWAYS
      - BARE_METAL_INSTANCE_RUN_STRATEGY_HALTED
      type: string
    v1BareMetalInstanceSpec:
      description: The spec contains the details of a bare metal instance as desired
        by the user.
      properties:
        catalog_item:
          description: Reference to the BareMetalInstanceCatalogItem. Required on
            create; immutable after creation.
          type: string
        image:
          $ref: '#/components/schemas/v1BareMetalInstanceImage'
        restart_trigger:
          description: |-
            Used to trigger a restart of the physical machine. Change it to any value to trigger the restart.
            The value itself is not important; only the change matters.
            The controller compares this with `status.restart_trigger` and initiates a power cycle when they differ.
          format: int64
          type: string
        run_strategy:
          $ref: '#/components/schemas/v1BareMetalInstanceRunStrategy'
        ssh_public_key:
          description: |-
            SSH public key injected into the OS at provisioning time. Immutable after creation.
            Must be a valid SSH public key in OpenSSH format (ssh-rsa, ssh-ed25519, etc.).
            Invalid keys are rejected at create time with a 400 error.
          type: string
        template_parameters:
          additionalProperties:
            $ref: '#/components/schemas/protobufAny'
          description: |-
            Values of the template parameters passed to the provisioning template.

            When using the HTTP+JSON version of the API the values must be represented as documented in the [ProtoJSON format
            document](https://protobuf.dev/programming-guides/json). For example, if the template has a `disk_layout`
            parameter of string type, the complete bare metal instance should be represented like this:

            ```json
            {
              "spec": {
                "catalog_item": "gpu-node",
                "template_parameters": {
                  "disk_layout": {
                    "@type": "type.googleapis.com/google.protobuf.StringValue",
                    "value": "raid1"
                  }
                }
              }
            }
            ```

            The possible values of the `@type` are the same as those used by the `type_url` field of the `Any` type:

            | Type                           | Value                                             |
            |--------------------------------|---------------------------------------------------|
            | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
            | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
            | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
            | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
            | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
            | String                         | `type.googleapis.com/google.protobuf.StringValue` |
            | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
            | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
            | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
            | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |

            These parameters can't be modified after the bare metal instance is created.
          type: object
        user_data:
          description: |-
            User data (e.g. cloud-init). Passed to the OS at first boot. Immutable after creation.
            Maximum size: 64 KB.
          type: string
      type: object
    v1BareMetalInstanceState:
      default: BARE_METAL_INSTANCE_STATE_UNSPECIFIED
      description: Represents the overall state of a bare metal instance.
      enum:
      - BARE_METAL_INSTANCE_STATE_UNSPECIFIED
      - BARE_METAL_INSTANCE_STATE_PROVISIONING
      - BARE_METAL_INSTANCE_STATE_RUNNING
      - BARE_METAL_INSTANCE_STATE_FAILED
      - BARE_METAL_INSTANCE_STATE_DELETING
      - BARE_METAL_INSTANCE_STATE_STARTING
      - BARE_METAL_INSTANCE_STATE_STOPPING
      - BARE_METAL_INSTANCE_STATE_STOPPED
      type: string
    v1BareMetalInstanceStatus:
      description: The status contains the details of the bare metal instance provided
        by the system.
      properties:
        conditions:
          description: Contains a list of conditions that describe in detail the status
            of the bare metal instance.
          items:
            $ref: '#/components/schemas/v1BareMetalInstanceCondition'
          type: array
        restart_trigger:
          description: |-
            Echo of `spec.restart_trigger` after the controller has executed the requested restart.
            The controller sets this to match `spec.restart_trigger` once the power cycle is complete.
          format: int64
          type: string
        state:
          $ref: '#/components/schemas/v1BareMetalInstanceState'
      type: object
    v1BareMetalInstanceTemplate:
      description: |-
        A bare metal instance template defines a hardware profile (host type, OS image, network configuration)
        that can be used to create bare metal instances via a catalog item.
      properties:
        description:
          description: Human friendly long description of the template, using Markdown
            format.
          type: string
        id:
          description: Unique identifier of the template.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        parameters:
          description: |-
            Definitions of the parameters that can be used to customize the template.

            Note that these are only the *definitions* of the parameters, not the actual values. The actual values are in the
            `spec.template_parameters` field of the bare metal instance.
          items:
            $ref: '#/components/schemas/v1BareMetalInstanceTemplateParameterDefinition'
          type: array
        spec_defaults:
          $ref: '#/components/schemas/v1BareMetalInstanceTemplateSpecDefaults'
        title:
          description: Human friendly short description of the template, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    v1BareMetalInstanceTemplateParameterDefinition:
      description: Contains type and documentation of a template parameter.
      properties:
        default:
          $ref: '#/components/schemas/protobufAny'
        description:
          description: Human friendly description of the parameter, using Markdown
            format.
          type: string
        name:
          description: |-
            Name of the parameter.

            This is the name that should be used in the `template_parameters` field of the bare metal instance to assign a
            value to the parameter.
          type: string
        required:
          description: |-
            Indicates if this parameter is required or optional.

            Values for required parameters must be included when creating the bare metal instance, otherwise it will be
            rejected.

            Note that there may be other dependencies between parameters which may cause a bare metal instance to be rejected.
            For example, the allowed values of a parameter may depend on the value of another parameter. That kind of
            information will be in the `description` field.
          type: boolean
        title:
          description: |-
            Human friendly short description of the parameter, only a few words, suitable for displaying in one single line on
            a UI or CLI.
          type: string
        type:
          description: |-
            Type of the parameter.

            The possible values are the same as those used by the `type_url` field of the `Any` type:

            | Type                           | Value                                             |
            |--------------------------------|---------------------------------------------------|
            | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
            | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
            | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
            | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
            | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
            | String                         | `type.googleapis.com/google.protobuf.StringValue` |
            | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
            | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
            | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
            | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |

            When using the HTTP+JSON version of the API the value provided in the `template_parameters` field of the bare
            metal instance must be represented as documented in the
            [ProtoJSON format document](https://protobuf.dev/programming-guides/json).
          type: string
      type: object
    v1BareMetalInstanceTemplateSpecDefaults:
      description: Default values for bare metal instance spec fields.
      properties:
        image:
          $ref: '#/components/schemas/v1BareMetalInstanceImage'
      type: object
    v1BareMetalInstanceTemplatesCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstanceTemplate'
      type: object
    v1BareMetalInstanceTemplatesDeleteResponse:
      type: object
    v1BareMetalInstanceTemplatesGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstanceTemplate'
      type: object
    v1BareMetalInstanceTemplatesListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/v1BareMetalInstanceTemplate'
          type: array
        size:
          format: int32
          type: integer
        total:
          format: int32
          type: integer
      type: object
    v1BareMetalInstanceTemplatesUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstanceTemplate'
      type: object
    v1BareMetalInstancesCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstance'
      type: object
    v1BareMetalInstancesDeleteResponse:
      type: object
    v1BareMetalInstancesGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstance'
      type: object
    v1BareMetalInstancesListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/v1BareMetalInstance'
          type: array
        size:
          format: int32
          type: integer
        total:
          format: int32
          type: integer
      type: object
    v1BareMetalInstancesUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1BareMetalInstance'
      type: object
    v1CapabilitiesGetResponse:
      description: Response message for the `Get` method of the `Capabilities` service.
      properties:
        authn:
          $ref: '#/components/schemas/v1AuthnCapabilities'
      type: object
    v1Cluster:
      description: |-
        Contains the details of the cluster.

        The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status of
        the cluster, is provided by the system and can't be modified by the user.
      properties:
        id:
          description: Unique identifier of the cluster.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ClusterSpec'
        status:
          $ref: '#/components/schemas/v1ClusterStatus'
      type: object
    v1ClusterCatalogItem:
      description: |-
        A cluster catalog item defines a curated infrastructure offering that references an underlying cluster template.
        Admins control which fields users can set, enforce defaults, and validate input via JSON Schema.
      properties:
        description:
          description: Human friendly long description of the catalog item, using
            Markdown format.
          type: string
        field_definitions:
          description: Definitions of the fields that users can or cannot set when
            creating a resource from this catalog item.
          items:
            $ref: '#/components/schemas/v1FieldDefinition'
          type: array
        id:
          description: Unique identifier of the catalog item.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        published:
          description: Whether this catalog item is published.
          type: boolean
        template:
          description: Identifier of the underlying cluster template that this catalog
            item references.
          type: string
        title:
          description: Human friendly short description of the catalog item, suitable
            for displaying in one single line on a UI or CLI.
          type: string
      type: object
    v1ClusterCatalogItemsCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ClusterCatalogItem'
      type: object
    v1ClusterCatalogItemsDeleteResponse:
      type: object
    v1ClusterCatalogItemsGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ClusterCatalogItem'
      type: object
    v1ClusterCatalogItemsListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/v1ClusterCatalogItem'
          type: array
        size:
          format: int32
          type: integer
        total:
          format: int32
          type: integer
      type: object
    v1ClusterCatalogItemsUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ClusterCatalogItem'
      type: object
    v1ClusterCondition:
      description: Contains the details of a condition that describes the status of
        a cluster.
      properties:
        last_transition_time:
          description: This time is the last time that the condition was updated.
          format: date-time
          type: string
        message:
          description: |-
            Contains a text giving more details of the condition.

            This will usually be progress reports, or error messages, and are intended for use by humans, to debug problems.
          type: string
        reason:
          description: |-
            Contains a the reason of the condition in a format suitable for use by programs.

            The possible values will be documented in the object that contains the condition.
          type: string
        status:
          $ref: '#/components/schemas/v1ConditionStatus'
        type:
          $ref: '#/components/schemas/v1ClusterConditionType'
      type: object
    v1ClusterConditionType:
      default: CLUSTER_CONDITION_TYPE_UNSPECIFIED
      description: |-
        Types of conditions used to describe the status of cluster.

         - CLUSTER_CONDITION_TYPE_UNSPECIFIED: Unspecified indicates that the condition is unknown.

        This will never be appear in the `spec.conditions` field of a cluster.
         - CLUSTER_CONDITION_TYPE_PROGRESSING: Indicates that the cluster isn't completely ready yet.

        Currently there are no `reason` values defined.
         - CLUSTER_CONDITION_TYPE_READY: Indicates that the cluster is ready to use.

        Currently there are no `reason` values defined.
         - CLUSTER_CONDITION_TYPE_FAILED: Indicates that the cluster is unusable.

        Currently there are no `reason` values defined.
         - CLUSTER_CONDITION_TYPE_DEGRADED: Indicates that the cluster is degraded.
      enum:
      - CLUSTER_CONDITION_TYPE_UNSPECIFIED
      - CLUSTER_CONDITION_TYPE_PROGRESSING
      - CLUSTER_CONDITION_TYPE_READY
      - CLUSTER_CONDITION_TYPE_FAILED
      - CLUSTER_CONDITION_TYPE_DEGRADED
      type: string
    v1ClusterNetwork:
      description: Networking configuration for a cluster.
      properties:
        pod_cidr:
          description: |-
            CIDR for the cluster's pod network.

            Must be valid CIDR notation. If not provided, defaults to `10.128.0.0/14`.
          type: string
        service_cidr:
          description: |-
            CIDR for the cluster's service network.

            Must be valid CIDR notation. If not provided, defaults to `172.30.0.0/16`.
          type: string
      type: object
    v1ClusterNodeSet:
      description: Defines a set of nodes that are part of the cluster, all of them
        of the same type of host.
      properties:
        host_type:
          description: |-
            Identifier of the type of hosts that are part of the set.

            The details of the host type can be obtained using the `List` and `Get` method of the `HostTypes` service. For
            example, to get the details of the `acme_1tb` host type using the HTTP+JSON version of the API:

            ```http
            GET /api/fulfillment/v1/host_types/acme_1tb
            ```

            Which will return something like this:

            ```json
            {
              "id": "acme_1tb",
              "title": "ACME server with 1 TiB of RAM and no GPU",
              "description": "ACME server model XYZ with 1 TiB of RAM, 2 Xeon 6 CPUS and no GPU."
            }
            ```

            This will be set by the system when the cluster is initially created, according to the template selected by the
            user.

            The user will not have permission to change this field.
          type: string
        size:
          description: Number of nodes of the set.
          format: int32
          type: integer
      type: object
    v1ClusterSpec:
      description: The spec contains the details of a cluster as desired by the user.
      properties:
        catalog_item:
          description: |-
            Reference to a cluster catalog item. Mutually exclusive with template during the migration period.
            When set, the server fetches the catalog item and applies its field definitions.
          type: string
        network:
          $ref: '#/components/schemas/v1ClusterNetwork'
        node_sets:
          additionalProperties:
            $ref: '#/components/schemas/v1ClusterNodeSet'
          description: |-
            Desired node sets of the cluster.

            This will be automatically set by the system when the cluster is initially created, according to the template
            selected by the user, and can be later modified to change the size.

            The key of the map is the unique identifier of the node set for this cluster.

            For example, a cluster created with two different node sets, one for nodes without GPUs and another for nodes with
            GPUs could be represented like this:

            ```json
            {
              "id": "123",
              "spec": {
                "node_sets": {
                  "compute": {
                    "host_type": "acme_1tb",
                    "size": 3
                  },
                  "gpu": {
                    "host_type": "acme_1tb_h100",
                    "size": 3
                  }
                }
              },
              "status": {
                "state": "CLUSTER_STATE_READY",
                "node_sets": {
                  "compute": {
                    "host_type": "acme_1tb",
                    "size": 3
                  },
                  "gpu": {
                    "host_type": "acme_1tb_h100",
                    "size": 3
                  }
                }
              }
            }
            ```

            The user will not be allowed to change the `host_type` field.

            The user will be allowed to add new node sets.

            The user will be allowed to remove existing node sets, except when only one node set remains. Clusters
            must have at least one node set.

            The user will be allowed to update `size` field.

            If at any time the system can't allocate the number of nodes requested by the user, because of permissions, quota,
            availability of resources or system errors, the cluster will be marked as degraded, and the details will be in the
            `DEGRADED` condition.
          type: object
        pull_secret:
          description: |-
            Credentials for authenticating to container image repositories.

            This is write-only: the value is redacted in GET responses. If not provided, the provider's default pull secret
            is used.
          type: string
        release_image:
          description: |-
            OCP release image URL that controls the OpenShift version.

            For example: `quay.io/openshift-release-dev/ocp-release:4.17.0-multi`.
            If not provided, the template's default release image is used.
          type: string
        ssh_public_key:
          description: |-
            SSH public key installed into the `authorized_keys` file on cluster worker nodes.

            If not provided, the provider's default SSH key is used.
          type: string
        template:
          description: |-
            Reference to the cluster template. Either `template` or `catalog_item` is required on create.

            Must be the value of the `id` field of one of the cluster templates. Mutually exclusive with `catalog_item`.

            This can't be modified after the cluster is created.
          type: string
        template_parameters:
          additionalProperties:
            $ref: '#/components/schemas/protobufAny'
          description: |-
            Values of the template parameters.

            When using the HTTP+JSON version of the API the values must be represented as documented in the (ProtoJSON format
            document)[https://protobuf.dev/programming-guides/json]. For example, if the template has a `number_of_gpus`
            parameter of integer type, the complete cluster should be represented like this:

            ```json
            {
              "spec": {
                "template_id": "123",
                "template_parameters": {
                  "number_of_gpus": {
                    "@type": "type.googleapis.com/google.protobuf.Int32Value",
                    "value": 3
                  }
                }
              }
            }
            ```

            The possible values of the `@type` are the same as those used by the `type_url` field of the `Any` type:

            | Type                           | Value                                             |
            |--------------------------------|---------------------------------------------------|
            | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
            | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
            | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
            | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
            | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
            | String                         | `type.googleapis.com/google.protobuf.StringValue` |
            | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
            | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
            | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
            | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |

            These parameters can't be modified after the cluster is created.
          type: object
      type: object
    v1ClusterState:
      default: CLUSTER_STATE_UNSPECIFIED
      description: |-
        Represents the overall state of a cluster.

         - CLUSTER_STATE_UNSPECIFIED: Unspecified indicates that the state is unknown.
         - CLUSTER_STATE_PROGRESSING: Indicates that the cluster isn't ready yet.
         - CLUSTER_STATE_READY: Indicates indicates that the cluster is ready.
         - CLUSTER_STATE_FAILED: Indicates indicates that the cluster is unusable.
      enum:
      - CLUSTER_STATE_UNSPECIFIED
      - CLUSTER_STATE_PROGRESSING
      - CLUSTER_STATE_READY
      - CLUSTER_STATE_FAILED
      type: string
    v1ClusterStatus:
      description: The status contains the details of the cluster provided by the
        system.
      properties:
        api_url:
          description: |-
            URL of te API server of the cluster.

            This will be empty if the cluster isn't ready.
          type: string
        conditions:
          description: |-
            Contains a list of conditions that describe in detail the status of the cluster.

            For example, an cluster that is ready could be represented like this (when converted to JSON):

               {
                 "id": "123",
                 "spec": {
                 },
                 "status": {
                   "state": "CLUSTER_STATE_READY",
                   "conditions": [
                     {
                       "type": "CLUSTER_CONDITION_TYPE_READY",
                       "status": "CONDITION_STATUS_TRUE",
                       "last_transition_time": "2025-03-12 20:15:59+00:00",
                       "message": "The cluster is ready to use",
                     },
                     {
                       "type": "CLUSTER_CONDITION_TYPE_FAILED",
                       "status": "CONDITION_STATUS_FALSE",
                       "last_transition_time": "2025-03-12 20:10:59+00:00"
                     }
                   ]
                 }
               }

            In this example the `READY` condition is true. That tells us that the cluster is ready to use via the API URL
            provided in the `status.api_url` field.

            The `FAILED` condition is false. That tells us that the cluster is *not* failed.

            Note that in this example, to make it shorter, only one condition appears. In general all the conditions (except
            `UNSPECIFIED`) will appear exactly once.

            Check the documentation of the values of the `ClusterConditionType` enumerated type to see possible conditions and
            reasons.
          items:
            $ref: '#/components/schemas/v1ClusterCondition'
          type: array
        console_url:
          description: |-
            URL of the console of the cluster.

            This will be empty if the cluster isn't ready or the console isn't enabled.
          type: string
        node_sets:
          additionalProperties:
            $ref: '#/components/schemas/v1ClusterNodeSet'
          description: |-
            Current node sets of the cluster.

            This is the current status of the node sets. It will be different to `spec.node_sets` when there is a change that
            is in progress, or if the system can't apply the changes requested by the user.

            The key of the map is the unique identifier of the node set for this cluster.
          type: object
        state:
          $ref: '#/components/schemas/v1ClusterState'
      type: object
    v1ClusterTemplate:
      description: |-
        A cluster template defines a type of cluster that can be created by the user. Note that the user doesn't create these
        templates: the system provides a collection of them, and the user chooses one.
      properties:
        description:
          description: Human friendly long description of the template, using Markdown
            format.
          type: string
        id:
          description: Unique identifier of the template.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        node_sets:
          additionalProperties:
            $ref: '#/components/schemas/v1ClusterTemplateNodeSet'
          description: Initial node sets of the cluster.
          type: object
        parameters:
          description: |-
            Definitions of the parameters that can be used to customize the template.

            Note that these are only the *definitions* of the parameters, not the actual values. The actual values are in the
            `spec.template_parameters` field of the cluster.
          items:
            $ref: '#/components/schemas/v1ClusterTemplateParameterDefinition'
          type: array
        spec_defaults:
          $ref: '#/components/schemas/v1ClusterTemplateSpecDefaults'
        title:
          description: |-
            Human friendly short description of the template, only a few words, suitable for displaying in one single line on a
            UI or CLI.
          type: string
      type: object
    v1ClusterTemplateNodeSet:
      description: Defines a set of nodes that will be part of cluster, all of them
        of the same type of host.
      properties:
        host_type:
          description: Identifier of the type of hosts that are part of the set.
          type: string
        size:
          description: Number of nodes of the set.
          format: int32
          type: integer
      type: object
    v1ClusterTemplateParameterDefinition:
      description: Contains type and documentation of a template parameter.
      properties:
        default:
          $ref: '#/components/schemas/protobufAny'
        description:
          description: Human friendly description of the parameter, using Markdown
            format.
          type: string
        name:
          description: |-
            Name of the parameter.

            This is the name that should be used in the `template_parameters` field of the cluster to assign a value to the
            parameter.
          type: string
        required:
          description: |-
            Indicates if this parameter is required or optional.

            Values for required parameters must be included when creating the cluster, otherwise it will be rejected.

            Note that there may be other dependencies between parameters which may cause a cluster to be rejected. For example,
            the allowed values of a parameter may depend on the value of another parameter. That kind of information will be in
            the `description` field.
          type: boolean
        title:
          description: |-
            Human friendly short description of the parameter, only a few words, suitable for displaying in one single line on
            a UI or CLI.
          type: string
        type:
          description: |-
            Type of the parameter.

            The possible values are the same as those used by the `type_url` field of the `Any` type:

            | Type                           | Value                                             |
            |--------------------------------|---------------------------------------------------|
            | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
            | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
            | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
            | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
            | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
            | String                         | `type.googleapis.com/google.protobuf.StringValue` |
            | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
            | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
            | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
            | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |

            When using the HTTP+JSON version of the API the value provided in the `template_parameters` field of the cluster
            must be represented as documented in the (ProtoJSON format document)[https://protobuf.dev/programming-guides/json].
          type: string
      type: object
    v1ClusterTemplateSpecDefaults:
      description: |-
        Default values for cluster spec fields. These are applied when a user creates a cluster without
        providing explicit values. User-provided values always override these defaults.

        Note: pull_secret is excluded from the public API because it is a write-only field
        (redacted in GET responses). The private API includes it for server-side default resolution.
      properties:
        network:
          $ref: '#/components/schemas/v1ClusterNetwork'
        release_image:
          description: Default OCP release image URL.
          type: string
        ssh_public_key:
          description: Default SSH public key installed on cluster worker nodes.
          type: string
      type: object
    v1ClusterTemplatesCreateResponse:
      properties:
