      type: object
    v1ClusterVersion:
      description: |-
        Describes an OpenShift release version available for cluster provisioning.

        Cluster versions are admin-managed catalog entries that define which OpenShift versions are available. Users
        select a cluster version by name when creating clusters, either directly via Cluster `spec.version_name` or
        through a ClusterTemplate `spec_defaults.version_name`. Cloud Provider Admins control the version catalog
        through lifecycle-managed cluster versions.

        If `metadata.name` is omitted on creation, it is auto-generated from `spec.version` by lowercasing and
        replacing non-alphanumeric characters with dashes (e.g., "4.17.0" becomes "4-17-0").

        Lifecycle follows: ACTIVE -> DEPRECATED -> OBSOLETE. All transitions between states are allowed.
        Deletion is rejected if the version is referenced by active clusters, templates, or catalog items.

        The `spec` contains the desired configuration, and may be modified by the admin. The `status` contains the
        current state of the cluster version, is provided by the system and can't be modified by the user.
      properties:
        id:
          description: Unique identifier of the cluster version.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ClusterVersionSpec'
        status:
          $ref: '#/components/schemas/v1ClusterVersionStatus'
      type: object
    v1ClusterVersionAllowedUpgrades:
      description: |-
        Constrains which cluster versions are valid upgrade targets from a given version.

        Three-way semantics apply:
        - Message absent: no path constraint is enforced (the target must still be enabled and not obsolete).
        - Message present with empty version_names: no valid targets exist and version change is rejected.
        - Message present with version_names: only the listed versions are accepted as upgrade targets.
      properties:
        version_names:
          description: |-
            ClusterVersion names (metadata.name). Must reference existing, non-deleted ClusterVersions. When a target
            version is deleted, it is automatically removed from all lists.
          items:
            type: string
          type: array
      type: object
    v1ClusterVersionDeprecation:
      description: |-
        Contains deprecation details for a cluster version.

        The timestamps are managed by the server during lifecycle state transitions. The deprecation_timestamp is set when
        the version transitions to DEPRECATED, and the obsolescence_timestamp is set when it transitions to OBSOLETE. Both
        are cleared if the version returns to ACTIVE.
      properties:
        deprecation_timestamp:
          description: When deprecation was announced. Auto-set on transition to DEPRECATED.
          format: date-time
          readOnly: true
          type: string
        obsolescence_timestamp:
          description: When the cluster version becomes or became obsolete. Auto-set
            on transition to OBSOLETE.
          format: date-time
          readOnly: true
          type: string
      type: object
    v1ClusterVersionSpec:
      description: |-
        Defines the desired configuration for a ClusterVersion.

        The spec contains admin-specified parameters that define the version catalog entry. The `version` field is
        immutable after creation. The `enabled`, `is_default`, `state`, `deprecation`, and `allowed_upgrades` fields
        may be updated to manage the version lifecycle.
      properties:
        allowed_upgrades:
          $ref: '#/components/schemas/v1ClusterVersionAllowedUpgrades'
        deprecation:
          $ref: '#/components/schemas/v1ClusterVersionDeprecation'
        enabled:
          description: |-
            Controls whether new clusters may select this version. Defaults to true on creation.

            Setting to false prevents new cluster creation with this version. If the version was the default,
            `is_default` is auto-cleared.
          type: boolean
        is_default:
          description: |-
            At most one active ClusterVersion may be the default. Setting this to true on one version clears it on
            the previous default atomically. Auto-cleared when the version becomes OBSOLETE or disabled.

            When creating a cluster, the version is resolved with the following precedence:
            explicit `spec.version_name` > template `spec_defaults.version_name` > system default (`is_default=true`).
          type: boolean
        state:
          $ref: '#/components/schemas/v1ClusterVersionState'
        version:
          description: |-
            Stable semver identifier for this version. Required on creation, immutable afterwards.

            Must be a valid SemVer 2.0.0 string, max 256 characters. Must be unique among active (non-deleted)
            ClusterVersions.

            Example: "4.17.0", "4.17.0-rc.1"
          type: string
      required:
      - version
      type: object
    v1ClusterVersionState:
      default: CLUSTER_VERSION_STATE_UNSPECIFIED
      description: |-
        Lifecycle states for ClusterVersion resources.

        All transitions between states are allowed: ACTIVE <-> DEPRECATED <-> OBSOLETE, ACTIVE <-> OBSOLETE.
        Timestamps in ClusterVersionDeprecation are managed automatically during transitions.

         - CLUSTER_VERSION_STATE_UNSPECIFIED: State is unknown or has not been determined yet.
         - CLUSTER_VERSION_STATE_ACTIVE: The cluster version is fully available for new cluster creation.

        This is the default state assigned on creation. Returning to ACTIVE from DEPRECATED or OBSOLETE
        clears the corresponding deprecation timestamps.
         - CLUSTER_VERSION_STATE_DEPRECATED: The cluster version is available with warnings; migration to a newer version is recommended.

        Clusters can still be created with a deprecated version, but users are encouraged to choose an
        active version instead. The deprecation_timestamp is set automatically on transition to this state.
         - CLUSTER_VERSION_STATE_OBSOLETE: The cluster version is not available for new clusters; visible for lookups only.

        New cluster creation with this version is rejected. If the version was the default, `is_default`
        is auto-cleared. The obsolescence_timestamp is set automatically on transition to this state.
      enum:
      - CLUSTER_VERSION_STATE_UNSPECIFIED
      - CLUSTER_VERSION_STATE_ACTIVE
      - CLUSTER_VERSION_STATE_DEPRECATED
      - CLUSTER_VERSION_STATE_OBSOLETE
      type: string
    v1ClusterVersionStatus:
      description: |-
        Contains the system-provided status of a ClusterVersion.

        Currently empty. Reserved for future use.
      type: object
    v1ClusterVersionsCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ClusterVersion'
      type: object
    v1ClusterVersionsDeleteResponse:
      type: object
    v1ClusterVersionsGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ClusterVersion'
      type: object
    v1ClusterVersionsListResponse:
      properties:
        items:
          description: List of results.
          items:
            $ref: '#/components/schemas/v1ClusterVersion'
          type: array
        size:
          description: |-
            Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
            of the request if there are not enough items, or of the system decides that returning that number of items isn't
            feasible or convenient for performance reasons.
          format: int32
          type: integer
        total:
          description: |-
            Total number of items of the collection that match the search criteria, regardless of the number of results
            requested with the `limit` parameter.
          format: int32
          type: integer
      type: object
    v1ClusterVersionsUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ClusterVersion'
      type: object
    v1ClustersCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1Cluster'
      type: object
    v1ClustersDeleteResponse:
      type: object
    v1ClustersGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1Cluster'
      type: object
    v1ClustersListResponse:
      properties:
        items:
          description: List of results.
          items:
            $ref: '#/components/schemas/v1Cluster'
          type: array
        size:
          description: |-
            Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
            of the request if there are not enough items, or of the system decides that returning that number of items isn't
            feasible or convenient for performance reasons.
          format: int32
          type: integer
        total:
          description: |-
            Total number of items of the collection that match the search criteria, regardless of the number of results
            requested with the `limit` parameter.
          format: int32
          type: integer
      type: object
    v1ClustersUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1Cluster'
      type: object
    v1ComputeInstance:
      description: |-
        Contains the details of the compute instance.

        The `spec` contains the desired details, and may be modified by the user. The `status` contains the current status of
        the compute instance, is provided by the system and can't be modified by the user.
      properties:
