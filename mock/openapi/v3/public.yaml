          type: array
      type: object
    v1ComputeInstanceCondition:
      description: Contains the details of a condition that describes the status of
        a compute instance.
      properties:
        last_transition_time:
          description: This time is the last time that the condition was updated.
          format: date-time
          type: string
        message:
          description: |-
            Contains a text giving more details of the condition.

            This will usually be progress reports, or error messages, and are intended for use by humans, to debug problems.
          type: string
        reason:
          description: |-
            Contains a the reason of the condition in a format suitable for use by programs.

            The possible values will be documented in the object that contains the condition.
          type: string
        status:
          $ref: '#/components/schemas/v1ConditionStatus'
        type:
          $ref: '#/components/schemas/v1ComputeInstanceConditionType'
      type: object
    v1ComputeInstanceConditionType:
      default: COMPUTE_INSTANCE_CONDITION_TYPE_UNSPECIFIED
      description: |-
        Types of conditions used to describe the status of compute instance.

         - COMPUTE_INSTANCE_CONDITION_TYPE_UNSPECIFIED: Unspecified indicates that the condition is unknown.

        This will never be appear in the `spec.conditions` field of a compute instance.
         - COMPUTE_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED: Indicates that the compute instance configuration has been applied by the provisioning provider.

        When `status` is `TRUE`, the configuration currently described by the compute instance spec
        has been successfully applied. This is determined by comparing `status.desiredConfigVersion`
        with `status.reconciledConfigVersion`.

        When `status` is `FALSE`, configuration is currently being applied (e.g. during initial
        provisioning or after a spec update).
         - COMPUTE_INSTANCE_CONDITION_TYPE_READY: Indicates that the compute instance is ready (reachable per readiness checks).

        When `status` is `TRUE`, the compute instance is running and the readiness check
        has passed. The instance is reachable via the internal IP address in `status.internal_ip_address`.

        When `status` is `FALSE`, the instance is not yet reachable (e.g. it is still
        starting, the readiness check has not passed, or the instance is stopped/paused).

        Possible `reason` values:
        - `AsExpected`: Normal operational state.
         - COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS: Indicates that a restart is in progress.

        When `status` is `TRUE`, it means a restart is currently in progress.

        Possible `reason` values:
        - `RestartRequested`: A restart has been requested via `spec.restart_requested_at`.
        - `RestartInProgress`: The restart has been initiated.

        When `status` is `FALSE`, no restart is currently in progress.
         - COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_FAILED: Indicates that a restart request has failed.

        When `status` is `TRUE`, it means the restart could not be executed.
        The `message` field will contain details about the failure.
        If the issue persists, please contact your administrator.

        When `status` is `FALSE`, there is no restart failure.
         - COMPUTE_INSTANCE_CONDITION_TYPE_PROVISIONED: Indicates that the infrastructure resources (compute, storage) have been allocated.

        When `status` is `TRUE`, the compute instance has been created and
        infrastructure resources are allocated.

        When `status` is `FALSE`, infrastructure provisioning is in progress.
         - COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED: Indicates that the compute instance requires a restart for configuration changes
        to take effect.

        When `status` is `TRUE`, configuration changes have been applied to the VM spec
        but require a restart to take effect (they cannot be live-propagated).

        When `status` is `FALSE`, no restart is required.
      enum:
      - COMPUTE_INSTANCE_CONDITION_TYPE_UNSPECIFIED
      - COMPUTE_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED
      - COMPUTE_INSTANCE_CONDITION_TYPE_READY
      - COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS
      - COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_FAILED
      - COMPUTE_INSTANCE_CONDITION_TYPE_PROVISIONED
      - COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED
      type: string
    v1ComputeInstanceDisk:
      description: Contains the disk configuration for a compute instance.
      properties:
        size_gib:
          description: Disk size in GiB.
          format: int32
          type: integer
      type: object
    v1ComputeInstanceImage:
      description: Contains the image configuration for a compute instance.
      properties:
        source_ref:
          description: Image reference (e.g. OCI image URL).
          type: string
        source_type:
          description: Image source type (e.g. "registry").
          type: string
      type: object
    v1ComputeInstanceSpec:
      description: The spec contains the details of a compute instance as desired
        by the user.
      properties:
        additional_disks:
          description: Additional disk configurations.
          items:
            $ref: '#/components/schemas/v1ComputeInstanceDisk'
          type: array
        boot_disk:
          $ref: '#/components/schemas/v1ComputeInstanceDisk'
        catalog_item:
          description: |-
            Reference to a compute instance catalog item. Mutually exclusive with template during the migration period.
            When set, the server fetches the catalog item and applies its field definitions.
          type: string
        cores:
          description: Number of CPU cores.
          format: int32
          type: integer
        image:
          $ref: '#/components/schemas/v1ComputeInstanceImage'
        instance_type:
          description: |-
            Reference to an instance type by name. The API validates that the instance type exists and is
            not OBSOLETE, but does NOT resolve cores/memory_gib — resolution happens in the reconciler.
            Mutually exclusive with direct cores/memory_gib fields.
          type: string
        is_windows:
          description: |-
            IsWindows indicates whether this compute instance runs a Windows guest operating system.

            When `true`, the VM is configured for Windows. When `false` or omitted, the VM runs Linux.

            This field is immutable after creation - the guest OS type cannot be changed after the
            compute instance is provisioned.

            Example (when converted to JSON):

               {
                 "spec": {
                   "template": "123",
                   "is_windows": true
                 }
               }
          type: boolean
        memory_gib:
          description: Memory size in GiB.
          format: int32
          type: integer
        network_attachments:
          description: 'Network attachments: one entry per NIC.'
          items:
            $ref: '#/components/schemas/v1NetworkAttachment'
          type: array
        restart_requested_at:
          description: |-
            RestartRequestedAt is a timestamp signal to request a ComputeInstance restart.

            Set this field to the current time (usually NOW) to request a restart.
            The controller will execute the restart if this timestamp is greater than
            `status.last_restarted_at`.

            This is a declarative signal mechanism - the timestamp is a monotonically
            increasing value to detect new restart requests, not a scheduled time.
            Typically set to the current time for immediate restarts.

            External schedulers can set this field on a schedule to implement
            scheduled maintenance windows if needed.

            Example (when converted to JSON):

               {
                 "spec": {
                   "template": "123",
                   "restart_requested_at": "2026-01-20T14:30:00Z"
                 }
               }
          format: date-time
          type: string
        run_strategy:
          description: Run strategy for the compute instance (e.g. "Always" or "Halted").
          type: string
        ssh_key:
          description: SSH public key.
          type: string
        template:
          description: |-
            Reference to the compute instance template. Either `template` or `catalog_item` is required on create.

            Must be the value of the `id` field of one of the compute instance templates. Mutually exclusive with `catalog_item`.

            This can't be modified after the compute instance is created.
          type: string
        template_parameters:
          additionalProperties:
            $ref: '#/components/schemas/protobufAny'
          description: |-
            Values of the template parameters.

            When using the HTTP+JSON version of the API the values must be represented as documented in the (ProtoJSON format
            document)[https://protobuf.dev/programming-guides/json]. For example, if the template has a `cpu_count`
            parameter of integer type, the complete compute instance should be represented like this:

            ```json
            {
              "spec": {
                "template": "123",
                "template_parameters": {
                  "cpu_count": {
                    "@type": "type.googleapis.com/google.protobuf.Int32Value",
                    "value": 4
                  }
                }
              }
            }
            ```

            The possible values of the `@type` are the same as those used by the `type_url` field of the `Any` type:

            | Type                           | Value                                             |
            |--------------------------------|---------------------------------------------------|
            | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
            | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
            | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
            | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
            | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
            | String                         | `type.googleapis.com/google.protobuf.StringValue` |
            | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
            | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
            | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
            | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |

            These parameters can't be modified after the compute instance is created.
          type: object
        user_data:
          description: User data for the compute instance (e.g. cloud-init, ignition).
          type: string
      type: object
    v1ComputeInstanceState:
      default: COMPUTE_INSTANCE_STATE_UNSPECIFIED
      description: |-
        Represents the overall state of a compute instance.

         - COMPUTE_INSTANCE_STATE_UNSPECIFIED: Unspecified indicates that the state is unknown.
         - COMPUTE_INSTANCE_STATE_STARTING: Indicates that the compute instance is starting.
         - COMPUTE_INSTANCE_STATE_RUNNING: Indicates that the compute instance is running.
         - COMPUTE_INSTANCE_STATE_FAILED: Indicates that the compute instance is unusable.
         - COMPUTE_INSTANCE_STATE_DELETING: Indicates that the compute instance is being deleted.
         - COMPUTE_INSTANCE_STATE_STOPPING: Indicates that the compute instance is in the process of being stopped.
         - COMPUTE_INSTANCE_STATE_STOPPED: Indicates that the compute instance is stopped.
         - COMPUTE_INSTANCE_STATE_PAUSED: Indicates that the compute instance is paused.
      enum:
      - COMPUTE_INSTANCE_STATE_UNSPECIFIED
      - COMPUTE_INSTANCE_STATE_STARTING
      - COMPUTE_INSTANCE_STATE_RUNNING
      - COMPUTE_INSTANCE_STATE_FAILED
      - COMPUTE_INSTANCE_STATE_DELETING
      - COMPUTE_INSTANCE_STATE_STOPPING
      - COMPUTE_INSTANCE_STATE_STOPPED
      - COMPUTE_INSTANCE_STATE_PAUSED
      type: string
    v1ComputeInstanceStatus:
      description: The status contains the details of the compute instance provided
        by the system.
      properties:
        conditions:
          description: |-
            Contains a list of conditions that describe in detail the status of the compute instance.

            For example, a running compute instance could be represented like this (when converted to JSON):

               {
                 "id": "123",
                 "spec": {
                 },
                 "status": {
                   "state": "COMPUTE_INSTANCE_STATE_RUNNING",
                   "conditions": [
                     {
                       "type": "COMPUTE_INSTANCE_CONDITION_TYPE_PROVISIONED",
                       "status": "CONDITION_STATUS_TRUE",
                       "last_transition_time": "2025-03-12 20:10:01+00:00"
                     },
                     {
                       "type": "COMPUTE_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED",
                       "status": "CONDITION_STATUS_TRUE",
                       "last_transition_time": "2025-03-12 20:14:22+00:00"
                     },
                     {
                       "type": "COMPUTE_INSTANCE_CONDITION_TYPE_READY",
                       "status": "CONDITION_STATUS_TRUE",
                       "last_transition_time": "2025-03-12 20:15:59+00:00"
                     }
                   ]
                 }
               }

            In this example the `PROVISIONED` condition is true (infrastructure is allocated), `CONFIGURATION_APPLIED` is true
            (the desired configuration has been applied by the provisioning provider), and `READY` is true (the compute
            instance is reachable via the internal IP address in `status.internal_ip_address`).

            The `state` field reflects the VM power state as reported by the hypervisor. Possible states include
            `STARTING`, `RUNNING`, `FAILED`, `DELETING`, `STOPPING`, `STOPPED`, and `PAUSED`.

            Note that in this example, to make it shorter, only three conditions appear. In general all the conditions (except
            `UNSPECIFIED`) will appear exactly once.

            Check the documentation of the values of the `ComputeInstanceConditionType` enumerated type to see possible conditions and
            reasons.
          items:
            $ref: '#/components/schemas/v1ComputeInstanceCondition'
          type: array
        internal_ip_address:
          description: |-
            Internal IP address of the compute instance.

            This will be empty if the compute instance isn't running.
          type: string
        last_restarted_at:
          description: |-
            LastRestartedAt records when the last restart was initiated by the controller.

            This is set to `spec.restart_requested_at` when the controller processes a restart request.
            It will be empty if no restart has been performed yet.

            Example (when converted to JSON):

               {
                 "status": {
                   "state": "COMPUTE_INSTANCE_STATE_RUNNING",
                   "last_restarted_at": "2026-01-20T14:30:00Z"
                 }
               }
          format: date-time
          type: string
        public_ip_address:
          description: Public IP address attached to the compute instance.
          type: string
        state:
          $ref: '#/components/schemas/v1ComputeInstanceState'
      type: object
    v1ComputeInstanceTemplate:
      description: |-
        A compute instance template defines a type of compute instance that can be created by the user. Note that the user doesn't create these
        templates: the system provides a collection of them, and the user chooses one.
      properties:
        description:
          description: Human friendly long description of the template, using Markdown
            format.
          type: string
        id:
          description: Unique identifier of the template.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        parameters:
          description: |-
            Definitions of the parameters that can be used to customize the template.

            Note that these are only the *definitions* of the parameters, not the actual values. The actual values are in the
            `spec.template_parameters` field of the compute instance.
          items:
            $ref: '#/components/schemas/v1ComputeInstanceTemplateParameterDefinition'
          type: array
        spec_defaults:
          $ref: '#/components/schemas/v1ComputeInstanceTemplateSpecDefaults'
        title:
          description: |-
            Human friendly short description of the template, only a few words, suitable for displaying in one single line on a
            UI or CLI.
          type: string
      type: object
    v1ComputeInstanceTemplateParameterDefinition:
      description: Contains type and documentation of a template parameter.
      properties:
        default:
          $ref: '#/components/schemas/protobufAny'
        description:
          description: Human friendly description of the parameter, using Markdown
            format.
          type: string
        name:
          description: |-
            Name of the parameter.

            This is the name that should be used in the `template_parameters` field of the compute instance to assign a value to the
            parameter.
          type: string
        required:
          description: |-
            Indicates if this parameter is required or optional.

            Values for required parameters must be included when creating the compute instance, otherwise it will be rejected.

            Note that there may be other dependencies between parameters which may cause a compute instance to be rejected. For example,
            the allowed values of a parameter may depend on the value of another parameter. That kind of information will be in
            the `description` field.
          type: boolean
        title:
          description: |-
            Human friendly short description of the parameter, only a few words, suitable for displaying in one single line on
            a UI or CLI.
          type: string
        type:
          description: |-
            Type of the parameter.

            The possible values are the same as those used by the `type_url` field of the `Any` type:

            | Type                           | Value                                             |
            |--------------------------------|---------------------------------------------------|
            | Boolean                        | `type.googleapis.com/google.protobuf.BoolValue`   |
            | Integer number, 32 bits        | `type.googleapis.com/google.protobuf.Int32Value`  |
            | Integer number, 64 bits        | `type.googleapis.com/google.protobuf.Int64Value`  |
            | Floating point number, 32 bits | `type.googleapis.com/google.protobuf.FloatValue`  |
            | Floating point number, 64 bits | `type.googleapis.com/google.protobuf.DoubleValue` |
            | String                         | `type.googleapis.com/google.protobuf.StringValue` |
            | Timestamp                      | `type.googleapis.com/google.protobuf.Timestamp`   |
            | Duration                       | `type.googleapis.com/google.protobuf.Duration`    |
            | Array of bytes                 | `type.googleapis.com/google.protobuf.BytesValue`  |
            | Any JSON value                 | `type.googleapis.com/google.protobuf.Value`       |

            When using the HTTP+JSON version of the API the value provided in the `template_parameters` field of the compute instance
            must be represented as documented in the (ProtoJSON format document)[https://protobuf.dev/programming-guides/json].
          type: string
      type: object
    v1ComputeInstanceTemplateSpecDefaults:
      description: Default values for compute instance spec fields.
      properties:
        boot_disk:
          $ref: '#/components/schemas/v1ComputeInstanceDisk'
        cores:
          description: Default number of CPU cores.
          format: int32
          type: integer
        image:
          $ref: '#/components/schemas/v1ComputeInstanceImage'
        instance_type:
          description: Default instance type name. Mutually exclusive with cores/memory_gib
            defaults.
          type: string
        is_windows:
          description: Default guest OS type. When true, the VM runs Windows. When
            false or omitted, the VM runs Linux.
          type: boolean
        memory_gib:
          description: Default memory size in GiB.
          format: int32
          type: integer
        run_strategy:
          description: Default run strategy.
          type: string
      type: object
    v1ComputeInstanceTemplatesCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ComputeInstanceTemplate'
        warnings:
          description: Deprecation or validation warnings (e.g. deprecated instance
            type in spec_defaults).
          items:
            type: string
          type: array
      type: object
    v1ComputeInstanceTemplatesDeleteResponse:
      type: object
    v1ComputeInstanceTemplatesGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ComputeInstanceTemplate'
      type: object
    v1ComputeInstanceTemplatesListResponse:
      properties:
        items:
          description: List of results.
          items:
            $ref: '#/components/schemas/v1ComputeInstanceTemplate'
          type: array
        size:
          description: |-
            Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
            of the request if there are not enough items, or of the system decides that returning that number of items isn't
            feasible or convenient for performance reasons.
          format: int32
          type: integer
        total:
          description: |-
            Total number of items of the collection that match the search criteria, regardless of the number of results
            requested with the `limit` parameter.
          format: int32
          type: integer
      type: object
    v1ComputeInstanceTemplatesUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ComputeInstanceTemplate'
        warnings:
          description: Deprecation or validation warnings (e.g. deprecated instance
            type in spec_defaults).
          items:
            type: string
          type: array
      type: object
    v1ComputeInstancesCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ComputeInstance'
        warnings:
          description: |-
            Deprecation notices returned when the compute instance references a DEPRECATED instance type
            or uses the legacy cores/memory_gib fields directly.
          items:
            type: string
          type: array
      type: object
    v1ComputeInstancesDeleteResponse:
      type: object
    v1ComputeInstancesGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ComputeInstance'
      type: object
    v1ComputeInstancesListResponse:
      properties:
        items:
          description: List of results.
          items:
            $ref: '#/components/schemas/v1ComputeInstance'
          type: array
        size:
          description: |-
            Actual number of items returned. Note that this may be smaller than the value requested in the `limit` parameter
            of the request if there are not enough items, or of the system decides that returning that number of items isn't
            feasible or convenient for performance reasons.
          format: int32
          type: integer
        total:
          description: |-
            Total number of items of the collection that match the search criteria, regardless of the number of results
            requested with the `limit` parameter.
          format: int32
          type: integer
      type: object
    v1ComputeInstancesUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ComputeInstance'
      type: object
    v1ConditionStatus:
      default: CONDITION_STATUS_UNSPECIFIED
      description: |2-
         - CONDITION_STATUS_UNSPECIFIED: Indicates that the system can't decide if the object is in the condition or not.
         - CONDITION_STATUS_TRUE: Indicates that the object is in the condition.
         - CONDITION_STATUS_FALSE: Indicates that the object is not in the condition.
      enum:
      - CONDITION_STATUS_UNSPECIFIED
      - CONDITION_STATUS_TRUE
      - CONDITION_STATUS_FALSE
      type: string
    v1ConsoleResourceType:
      default: CONSOLE_RESOURCE_TYPE_UNSPECIFIED
      description: Type of resource to connect a console to.
      enum:
      - CONSOLE_RESOURCE_TYPE_UNSPECIFIED
      - CONSOLE_RESOURCE_TYPE_COMPUTE_INSTANCE
      - CONSOLE_RESOURCE_TYPE_HOST
      type: string
    v1ConsoleSession:
      description: |-
        ConsoleSession represents a single-use console access ticket. The ticket
        authorizes one connection to a resource's console via the console-proxy.
      properties:
        client_id:
          description: |-
            Stable identifier for the CLI process. When a new connection arrives with
            a client_id matching an existing session from the same user, the server
            evicts the stale session and admits the new one. Empty means no eviction.
          type: string
        expires_at:
          description: Authoritative expiry time for the ticket.
          format: date-time
          readOnly: true
          type: string
        resource_id:
          type: string
        resource_type:
          $ref: '#/components/schemas/v1ConsoleResourceType'
        ticket:
          description: |-
            Opaque encrypted ticket (nested JWE+JWS). Do not parse or log --
            it grants console access without further authentication.
          readOnly: true
          type: string
        type:
          $ref: '#/components/schemas/v1ConsoleType'
      type: object
    v1ConsoleSessionsCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ConsoleSession'
      type: object
    v1ConsoleType:
      default: CONSOLE_TYPE_UNSPECIFIED
      description: Type of console connection.
      enum:
      - CONSOLE_TYPE_UNSPECIFIED
      - CONSOLE_TYPE_SERIAL
      - CONSOLE_TYPE_VNC
      type: string
    v1Event:
      description: Represents events delivered by the server.
      properties:
        cluster:
          $ref: '#/components/schemas/v1Cluster'
        cluster_template:
          $ref: '#/components/schemas/v1ClusterTemplate'
        cluster_version:
          $ref: '#/components/schemas/v1ClusterVersion'
        compute_instance:
          $ref: '#/components/schemas/v1ComputeInstance'
        compute_instance_template:
          $ref: '#/components/schemas/v1ComputeInstanceTemplate'
        host_type:
          $ref: '#/components/schemas/v1HostType'
        id:
          description: Unique identifier of the event.
          type: string
        instance_type:
          $ref: '#/components/schemas/v1InstanceType'
        project:
          $ref: '#/components/schemas/v1Project'
        role:
          $ref: '#/components/schemas/v1Role'
        role_binding:
          $ref: '#/components/schemas/v1RoleBinding'
        tenant:
          $ref: '#/components/schemas/v1Tenant'
        type:
          $ref: '#/components/schemas/v1EventType'
      type: object
    v1EventType:
      default: EVENT_TYPE_UNSPECIFIED
      description: |2-
         - EVENT_TYPE_UNSPECIFIED: Unspecified means that the even type is unknown.
         - EVENT_TYPE_OBJECT_CREATED: Means that a new object has been created.

        The payload will contain the representation of the object.
         - EVENT_TYPE_OBJECT_UPDATED: Means that an existing object has been modified.

        The payload will contain the updated representation of the object.
         - EVENT_TYPE_OBJECT_DELETED: Means that an object has been deleted.

        The payload will contain the representation of the object right before it was deleted.
      enum:
      - EVENT_TYPE_UNSPECIFIED
      - EVENT_TYPE_OBJECT_CREATED
      - EVENT_TYPE_OBJECT_UPDATED
      - EVENT_TYPE_OBJECT_DELETED
      type: string
    v1EventsWatchResponse:
      properties:
        event:
          $ref: '#/components/schemas/v1Event'
      type: object
    v1EventsWatchResponseStreamResult:
      properties:
        error:
          $ref: '#/components/schemas/rpcStatus'
        result:
          $ref: '#/components/schemas/v1EventsWatchResponse'
      title: v1EventsWatchResponseStreamResult
      type: object
    v1ExternalIP:
      description: |-
        Represents an external IP address allocated from an ExternalIPPool.

        An ExternalIP is a floating IP address allocated from a parent ExternalIPPool's CIDR ranges.
        "External" means external to the VirtualNetwork — the address may be internet-routable or
        data-center-routable depending on the deployment topology. The pool assignment is immutable
        after creation.

        Attachment to a target resource (e.g., ComputeInstance, Cluster, BareMetalInstance) is managed
        by a separate ExternalIPAttachment resource. The status.attached boolean indicates whether an
        ExternalIPAttachment currently exists for this ExternalIP.

        The lifecycle follows: PENDING (awaiting allocation) -> ALLOCATED (IP assigned).
        FAILED is a terminal error state for provisioning failures.
      properties:
        id:
          description: Unique identifier of the external IP.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ExternalIPSpec'
        status:
          $ref: '#/components/schemas/v1ExternalIPStatus'
      type: object
    v1ExternalIPAttachment:
      description: |-
        Represents a binding between an ExternalIP and a target resource.

        An ExternalIPAttachment is a first-class resource that manages the attach/detach lifecycle
        independently from the ExternalIP allocation lifecycle. Creating an ExternalIPAttachment triggers
        the attach workflow; deleting it triggers the detach workflow.

        The binding is immutable: to change the target, delete the attachment and create a new one.
        The oneof target field supports ComputeInstance, Cluster, and BareMetalInstance targets.

        For cluster targets, the target_endpoint field specifies which cluster endpoint receives the
        external IP (API server or ingress). An ExternalIPAttachment can be created before the cluster
        is ready and will activate automatically once the cluster's VIP is available.

        Lifecycle: PENDING (attach in progress) -> READY (attached and routing traffic).
        FAILED is a terminal error state that retries via the standard provisioning lifecycle
        with exponential backoff.
      properties:
        id:
          description: Unique identifier of the external IP attachment.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ExternalIPAttachmentSpec'
        status:
          $ref: '#/components/schemas/v1ExternalIPAttachmentStatus'
      type: object
    v1ExternalIPAttachmentEndpoint:
      default: EXTERNAL_IP_ATTACHMENT_ENDPOINT_UNSPECIFIED
      description: |-
        Endpoint type for cluster-targeted ExternalIPAttachments.

        When attaching an external IP to a cluster, this enum specifies which cluster endpoint
        receives the DNAT rule.

         - EXTERNAL_IP_ATTACHMENT_ENDPOINT_UNSPECIFIED: Endpoint is unknown or has not been specified.
         - EXTERNAL_IP_ATTACHMENT_ENDPOINT_API: The cluster's API server endpoint.

        The external IP will be routed to the cluster's Kubernetes API server VIP, making the
        cluster API reachable from outside the VirtualNetwork.
         - EXTERNAL_IP_ATTACHMENT_ENDPOINT_INGRESS: The cluster's ingress endpoint.

        The external IP will be routed to the cluster's ingress controller VIP, making
        applications hosted on the cluster reachable from outside the VirtualNetwork.
      enum:
      - EXTERNAL_IP_ATTACHMENT_ENDPOINT_UNSPECIFIED
      - EXTERNAL_IP_ATTACHMENT_ENDPOINT_API
      - EXTERNAL_IP_ATTACHMENT_ENDPOINT_INGRESS
      type: string
    v1ExternalIPAttachmentSpec:
      description: |-
        Defines the desired configuration for an ExternalIPAttachment.

        All fields are required and immutable after creation. The external_ip must reference an
        existing ExternalIP in ALLOCATED state. The target must reference a valid resource that
        supports external IP attachment.
      properties:
        baremetal_instance:
          description: |-
            BareMetalInstance ID to attach this external IP to.

            Must reference the ID of an existing BareMetalInstance. DNAT rules will be configured
            to forward traffic from the external IP to the bare-metal instance's internal IP.

            Example: "01973b3d-c6e1-7ea4-9bcd-ef0123456789"
          type: string
        cluster:
          description: |-
            Cluster ID to attach this external IP to.

            Must reference the ID of an existing Cluster. The target_endpoint field is required
            when targeting a cluster to specify which endpoint (API or ingress) receives the
            external IP. The attachment can be created before the cluster is ready and will
            activate once the cluster's VIP is available.

            Example: "01973a2c-b5f0-7d93-8abc-def012345678"
          type: string
        compute_instance:
          description: |-
            ComputeInstance ID to attach this external IP to.

            Must reference the ID of an existing ComputeInstance in RUNNING state. Only one
            ExternalIPAttachment may exist per ComputeInstance.

            Example: "01972f1b-a4e9-7c82-9def-abcdef123456"
          type: string
        external_ip:
          description: |-
            ExternalIP ID to attach. Required and immutable after creation.

            Must reference the ID of an existing ExternalIP in ALLOCATED state that is not already
            attached (status.attached == false). Only one ExternalIPAttachment may exist per ExternalIP.

            Example: "019728a4-3f5c-7def-8abc-1234567890ab"
          type: string
        target_endpoint:
          $ref: '#/components/schemas/v1ExternalIPAttachmentEndpoint'
      required:
      - external_ip
      type: object
    v1ExternalIPAttachmentState:
      default: EXTERNAL_IP_ATTACHMENT_STATE_UNSPECIFIED
      description: |-
        Lifecycle states for ExternalIPAttachment resources.

        State transitions: UNSPECIFIED -> PENDING -> READY. On deletion: any state -> DELETING.
        FAILED can occur from PENDING and retries automatically via the provisioning lifecycle.

         - EXTERNAL_IP_ATTACHMENT_STATE_UNSPECIFIED: State is unknown or has not been determined yet.
         - EXTERNAL_IP_ATTACHMENT_STATE_PENDING: The attachment is being provisioned (attach workflow in progress).

        The system is binding the ExternalIP's allocated address to the target resource.
         - EXTERNAL_IP_ATTACHMENT_STATE_READY: The attachment is active and the target is reachable via the external IP address.

        The ExternalIP's allocated address is bound to the target resource and actively routing
        traffic. The parent ExternalIP's status.attached is set to true.
         - EXTERNAL_IP_ATTACHMENT_STATE_FAILED: The attachment failed. Check status.message for error details.

        The provisioning lifecycle retries automatically with exponential backoff.
         - EXTERNAL_IP_ATTACHMENT_STATE_DELETING: The attachment is being deprovisioned (detach workflow in progress).

        Triggered by deletion of the ExternalIPAttachment resource. The system unbinds the
        address from the target and cleans up DNAT rules or MetalLB Services.
        On completion, the parent ExternalIP's status.attached is set to false.
      enum:
      - EXTERNAL_IP_ATTACHMENT_STATE_UNSPECIFIED
      - EXTERNAL_IP_ATTACHMENT_STATE_PENDING
      - EXTERNAL_IP_ATTACHMENT_STATE_READY
      - EXTERNAL_IP_ATTACHMENT_STATE_FAILED
      - EXTERNAL_IP_ATTACHMENT_STATE_DELETING
      type: string
    v1ExternalIPAttachmentStatus:
      description: |-
        Represents the current operational state of an ExternalIPAttachment.

        Status is system-provided and read-only. Users cannot modify status fields directly; the
        system updates them based on reconciliation of the spec and feedback from the cluster
        controller.
      properties:
        external_ip_address:
          description: |-
            Allocated IP address from the parent ExternalIP.

            Populated for convenience once the attachment reaches READY state. Mirrors the address
            field from the referenced ExternalIP's status.
          readOnly: true
          type: string
        message:
          description: |-
            Human-readable message providing additional details about the current state.

            For PENDING state, may contain progress information. For FAILED state, contains the
            error details. Typically empty for READY state.
          readOnly: true
          type: string
        state:
          $ref: '#/components/schemas/v1ExternalIPAttachmentState'
      type: object
    v1ExternalIPAttachmentsCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIPAttachment'
      type: object
    v1ExternalIPAttachmentsDeleteResponse:
      type: object
    v1ExternalIPAttachmentsGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIPAttachment'
      type: object
    v1ExternalIPAttachmentsListResponse:
      properties:
        items:
          description: List of results.
          items:
            $ref: '#/components/schemas/v1ExternalIPAttachment'
          type: array
        size:
          description: Actual number of items returned.
          format: int32
          type: integer
        total:
          description: Total number of items of the collection that match the search
            criteria.
          format: int32
          type: integer
      type: object
    v1ExternalIPAttachmentsUpdateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIPAttachment'
      type: object
    v1ExternalIPPool:
      description: |-
        Represents a pool of external IP addresses available for allocation.

        ExternalIPPools are administrator-managed resources. The public API only surfaces pools that are
        ready and have available capacity.
        Tenants use this resource to discover available pools and select one when allocating an ExternalIP.
      properties:
        id:
          description: Unique identifier of the external IP pool.
          type: string
        metadata:
          $ref: '#/components/schemas/v1Metadata'
        spec:
          $ref: '#/components/schemas/v1ExternalIPPoolSpec'
        status:
          $ref: '#/components/schemas/v1ExternalIPPoolStatus'
      type: object
    v1ExternalIPPoolSpec:
      description: Defines the configuration of an ExternalIPPool.
      properties:
        ip_family:
          $ref: '#/components/schemas/v1IPFamily'
      type: object
    v1ExternalIPPoolStatus:
      description: Capacity information for an ExternalIPPool exposed to tenants.
      properties:
        available:
          description: Number of IP addresses available for new allocations from this
            pool.
          format: int64
          readOnly: true
          type: string
      type: object
    v1ExternalIPPoolsGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIPPool'
      type: object
    v1ExternalIPPoolsListResponse:
      properties:
        items:
          description: List of results.
          items:
            $ref: '#/components/schemas/v1ExternalIPPool'
          type: array
        size:
          description: Actual number of items returned.
          format: int32
          type: integer
        total:
          description: Total number of items matching the search criteria.
          format: int32
          type: integer
      type: object
    v1ExternalIPSpec:
      description: |-
        Defines the desired configuration for an ExternalIP.

        The pool field is required and immutable: once an ExternalIP is allocated from a pool, it cannot
        be moved to a different pool.
      properties:
        pool:
          description: |-
            Parent ExternalIPPool ID. Required and immutable after creation.

            Must reference the ID of an existing ExternalIPPool in READY state. The system allocates an
            available IP address from this pool's CIDR ranges during provisioning.

            Example: "pool-abc123"
          type: string
      required:
      - pool
      type: object
    v1ExternalIPState:
      default: EXTERNAL_IP_STATE_UNSPECIFIED
      description: |-
        Lifecycle states for ExternalIP resources.

        State transitions: UNSPECIFIED -> PENDING -> ALLOCATED.
        FAILED is a terminal error state for provisioning failures.

         - EXTERNAL_IP_STATE_UNSPECIFIED: State is unknown or has not been determined yet. Default state before initialization.
         - EXTERNAL_IP_STATE_PENDING: The external IP is being provisioned and an address has not been assigned yet.

        During this state, the system is creating the MetalLB LoadBalancer Service on the target
        cluster and waiting for an IP address to be allocated from the parent pool's CIDR range.
         - EXTERNAL_IP_STATE_ALLOCATED: The external IP has been assigned an address.

        The address is allocated and reserved. The IP can be attached to a target resource by
        creating an ExternalIPAttachment. The status.attached boolean indicates whether an
        attachment currently exists.
         - EXTERNAL_IP_STATE_FAILED: Provisioning failed. Check status.message for error details.

        This is a terminal error state. The ExternalIP may require deletion and recreation,
        or an administrator can retry via the private API Signal RPC.
         - EXTERNAL_IP_STATE_DELETING: The external IP is being deprovisioned and will be removed.

        On deletion of an ExternalIP, the system removes the MetalLB LoadBalancer Service and
        returns the address to the pool. An ExternalIP cannot be deleted while attached
        (status.attached = true). The resource remains visible in this state until fully
        cleaned up.
      enum:
      - EXTERNAL_IP_STATE_UNSPECIFIED
      - EXTERNAL_IP_STATE_PENDING
      - EXTERNAL_IP_STATE_ALLOCATED
      - EXTERNAL_IP_STATE_FAILED
      - EXTERNAL_IP_STATE_DELETING
      type: string
    v1ExternalIPStatus:
      description: |-
        Represents the current operational state of an ExternalIP.

        Status is system-provided and read-only. Users cannot modify status fields directly; the system
        updates them based on reconciliation of the spec and feedback from the cluster controller.
      properties:
        address:
          description: |-
            Allocated IP address from the parent pool's CIDR range.

            Populated once the IP transitions to ALLOCATED state. Remains stable for the lifetime of
            the ExternalIP. Cleared only when the IP is deallocated.
          readOnly: true
          type: string
        attached:
          description: |-
            Whether this ExternalIP is currently attached to a target resource via an ExternalIPAttachment.

            Set to true when an ExternalIPAttachment referencing this ExternalIP reaches READY state.
            Set to false when the ExternalIPAttachment is deleted. An ExternalIP with attached = true
            cannot be deleted; the ExternalIPAttachment must be deleted first.
          readOnly: true
          type: boolean
        message:
          description: |-
            Human-readable message providing additional details about the current state.

            For PENDING state, may contain progress information like "Waiting for IP allocation".
            Typically empty for ALLOCATED state.
          readOnly: true
          type: string
        pool:
          description: |-
            Parent ExternalIPPool ID that this IP was allocated from.

            Mirrors spec.pool for convenience in status queries. Populated when the IP is allocated.
          readOnly: true
          type: string
        state:
          $ref: '#/components/schemas/v1ExternalIPState'
      type: object
    v1ExternalIPsCreateResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIP'
      type: object
    v1ExternalIPsDeleteResponse:
      type: object
    v1ExternalIPsGetResponse:
      properties:
        object:
          $ref: '#/components/schemas/v1ExternalIP'
      type: object
    v1ExternalIPsListResponse:
      properties:
        items:
          description: List of results.
          items:
